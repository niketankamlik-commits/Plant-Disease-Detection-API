<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PlantCare API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/style.css">
    
    <style>
        .dashboard-main {
            min-height: 100vh;
            padding: 8rem 1.5rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-item {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--primary);
            color: #fff;
        }

        .content-area {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            min-height: 500px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .api-key-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .api-key-card:hover {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .api-key-info h4 {
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            font-family: monospace;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .api-key-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-active { background: rgba(16, 185, 129, 0.1); color: #10B981; border: 1px solid #10B981; }
        .status-expired { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animated">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
        <div class="noise-overlay"></div>
    </div>

    <nav class="glass-nav">
        <div class="nav-container">
            <a href="/" class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C12 22 20 18 20 12C20 6 12 2 12 2C12 2 4 6 4 12C4 18 12 22 12 22Z" fill="#10B981"/>
                    <path d="M12 22V12" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span class="logo-text">PlantCare <span class="highlight">API</span></span>
            </a>
            
            <div class="auth-buttons" id="navAuth"></div>
        </div>
    </nav>

    <main class="dashboard-main">
        <div class="dashboard-container">
            <aside class="sidebar fade-in-up">
                <a href="/dashboard" class="sidebar-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    API Keys
                </a>
                <a href="/info" class="sidebar-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    Documentation
                </a>
                <a href="/upload" class="sidebar-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Try Upload
                </a>
            </aside>

            <section class="content-area glass-panel fade-in-up" style="animation-delay: 0.1s;">
                <div class="section-header">
                    <h2>Manage <span class="highlight-gradient">API Keys</span></h2>
                    <button class="btn btn-primary" onclick="generateNewKey()">+ Generate New Key</button>
                </div>

                <div id="keysList">
                    <!-- Loaded via JS -->
                    <div class="empty-state">Loading your keys...</div>
                </div>

                <div style="margin-top: 4rem; padding: 2rem; background: rgba(0,0,0,0.2); border-radius: 12px;">
                    <h4 style="margin-bottom: 1rem;">Quick Start</h4>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">Use your API key to access our inference engine programmatically:</p>
                    <code style="background: #000; padding: 1rem; display: block; border-radius: 8px; font-size: 0.8rem; color: #10B981; border: 1px solid var(--glass-border);">
                        curl -X POST "http://127.0.0.1:8000/api/predict" \<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;-H "X-API-KEY: YOUR_KEY_HERE" \<br>
                        &nbsp;&nbsp;&nbsp;&nbsp;-F "file=@leaf_image.jpg"
                    </code>
                </div>
            </section>
        </div>
    </main>

    <script>
        let userData = null;

        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = '/login';
                return;
            }

            userData = JSON.parse(userStr);
            document.getElementById('navAuth').innerHTML = `
                <span style="color: var(--text-muted); margin-right: 15px;">${userData.name}</span>
                <button class="btn btn-ghost" onclick="logout()">Logout</button>
            `;

            loadKeys();
        });

        async function loadKeys() {
            try {
                const res = await fetch(`/api/keys/?user_id=${userData.id}`);
                const keys = await res.json();
                renderKeys(keys);
            } catch (err) {
                console.error(err);
                document.getElementById('keysList').innerHTML = '<div class="empty-state">Failed to load keys.</div>';
            }
        }

        function renderKeys(keys) {
            const list = document.getElementById('keysList');
            if (!keys || keys.length === 0) {
                list.innerHTML = '<div class="empty-state">No API keys found. Generate one to get started!</div>';
                return;
            }

            list.innerHTML = keys.map(k => {
                const isLifetime = !k.expires_at;
                const expiryStr = isLifetime ? 'Lifetime Access (Admin)' : `Expires: ${new Date(k.expires_at).toLocaleDateString()}`;
                const isActive = !k.expires_at || new Date(k.expires_at) > new Date();
                
                return `
                    <div class="api-key-card">
                        <div class="api-key-info">
                            <h4>${k.key}</h4>
                            <div class="api-key-meta">${expiryStr}</div>
                        </div>
                        <span class="status-badge ${isActive ? 'status-active' : 'status-expired'}">
                            ${isActive ? 'ACTIVE' : 'EXPIRED'}
                        </span>
                    </div>
                `;
            }).join('');
        }

        async function generateNewKey() {
            try {
                const res = await fetch(`/api/keys/generate?user_id=${userData.id}&user_name=${userData.name}`, {
                    method: 'POST'
                });
                if (res.ok) {
                    loadKeys();
                } else {
                    alert('Failed to generate key');
                }
            } catch (err) {
                console.error(err);
                alert('Connection error');
            }
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
    </script>
</body>
</html>

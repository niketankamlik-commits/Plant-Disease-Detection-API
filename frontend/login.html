<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PlantCare AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div class="bg-animated">
        <div class="hero-bg-image"></div>
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
        <div class="noise-overlay"></div>
    </div>

    <nav class="glass-nav">
        <div class="nav-container">
            <a href="/" class="logo" style="text-decoration: none; color: inherit;">
                <img src="/frontend/logo.png" alt="Phyto-Scan Logo" class="logo-image" style="height: 48px; width: auto; filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.3));">
                <span class="logo-text">PHYTO-<span class="highlight">SCAN</span></span>
            </a>
            <div class="auth-buttons">
                <a href="/register" class="btn btn-outline" style="text-decoration: none;">Register</a>
            </div>
        </div>
    </nav>

    <main class="auth-main">
        <div class="auth-container glass-panel fade-in-blur stagger-1">
            <div class="auth-header">
                <h2>Welcome <span class="highlight">Back</span></h2>
                <p>Log in to access your plant health history.</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" class="eye-btn" id="togglePassword">
                            <svg viewBox="0 0 24 24" fill="none" class="eye-open" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            <svg viewBox="0 0 24 24" fill="none" class="eye-closed" style="display:none;" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-large w-100 mt-2">Log In</button>
                <p class="auth-switch">Don't have an account? <a href="/register">Sign up</a></p>
            </form>
        </div>
    </main>
    <script src="/frontend/script.js"></script>
</body>
</html>

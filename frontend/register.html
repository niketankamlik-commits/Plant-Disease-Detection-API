<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Phyto-Scan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div class="bg-animated">
        <div class="hero-bg-image"></div>
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="glass-nav">
        <div class="nav-container">
            <div class="logo">
                <img src="/frontend/logo.png" alt="Phyto-Scan" class="logo-icon">
                <span>Phyto<span class="highlight">Scan</span></span>
            </div>
            <div class="auth-buttons">
                <a href="/login" class="btn btn-ghost" style="text-decoration: none;">Login</a>
            </div>
        </div>
    </nav>

    <main class="auth-main">
        <div class="auth-container glass-panel fade-in-blur stagger-1">
            <div class="auth-header">
                <h2>Join <span class="highlight">Phyto-Scan</span></h2>
                <p>Create an account to track your plant's health over time.</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="8">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-large w-100 mt-4">Create Account</button>
                <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
            </form>
        </div>
        <footer class="glass-footer" style="margin-top: 4rem; padding: 2rem; border-top: 1px solid var(--glass-border); text-align: center; position: relative; z-index: 10;">
            <p style="font-size: 0.75rem; color: var(--text-muted); opacity: 0.6;">&copy; 2026 Phyto-Scan AI.</p>
        </footer>
    </main>
    <script src="/frontend/js/ui.js"></script>
    <script src="/frontend/js/auth.js"></script>

</body>
</html>

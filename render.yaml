services:
  - type: web
    name: plant-api
    plan: starter
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SQLALCHEMY_DATABASE_URL
        fromDatabase:
          name: plant-db
          property: connectionString
      - key: PLANT_ID_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENROUTER_MODEL
        value: google/gemini-2.0-flash-001
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: plant-db
    databaseName: plantcare
    user: plantuser
    plan: free